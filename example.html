<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Pickadate example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="bootstrap-pickadate.css" rel="stylesheet">
</head>
<body class="p-4">
    <main class="container">
        <h1>Bootstrap Pickadate</h1>
        <div class="mb-3">
            <label for="example_date_display" class="form-label">Date</label>
            <div class="input-group">
                <input id="example_date_display" class="form-control bootstrap-pickadate" data-bs-pickadate-hidden-target="#example_date" data-bs-pickadate-locale="current">
                <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-toggle="#example_date_display"><i class="bi bi-calendar-date"></i></button>
                <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-clear="#example_date_display"><i class="bi bi-x-lg"></i></button>
            </div>
            <input id="example_date" type="hidden" name="example_date">
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="bootstrap-pickadate.js"></script>
    <script src="locales/bootstrap-pickadate.it.js"></script>
    <script>
        bsPickadate.setDefaultLocale("it");
    </script>
</body>
</html>
