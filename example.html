<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Pickadate 5.3.0 example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="bootstrap-pickadate.css" rel="stylesheet">
</head>
<body class="p-4">
    <main class="container">
        <header class="mb-4">
            <h1>Bootstrap Pickadate 5.3.0</h1>
            <p class="text-muted mb-0">Single date, two-input range, and same-input interval examples.</p>
        </header>

        <section class="card mb-4">
            <div class="card-header">Single date</div>
            <div class="card-body">
                <label for="example_date_display" class="form-label">Date</label>
                <div class="input-group">
                    <input
                        id="example_date_display"
                        class="form-control bootstrap-pickadate"
                        data-bs-pickadate-hidden-target="#example_date"
                        data-bs-pickadate-locale="current"
                    >
                    <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-toggle="#example_date_display">
                        <i class="bi bi-calendar-date"></i>
                    </button>
                    <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-clear="#example_date_display">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <input id="example_date" type="hidden" name="example_date">
                <div class="form-text">Hidden value: <code id="example_date_output"></code></div>
            </div>
        </section>

        <section class="card mb-4">
            <div class="card-header">Two-input range</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="range_start_display" class="form-label">Start date</label>
                        <div class="input-group">
                            <input
                                id="range_start_display"
                                class="form-control bootstrap-pickadate"
                                data-bs-pickadate-hidden-target="#range_start"
                                data-bs-pickadate-range-role="start"
                                data-bs-pickadate-range-pair="#range_end_display"
                                data-bs-pickadate-locale="current"
                            >
                            <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-toggle="#range_start_display">
                                <i class="bi bi-calendar-date"></i>
                            </button>
                        </div>
                        <input id="range_start" type="hidden" name="range_start">
                    </div>
                    <div class="col-md-6">
                        <label for="range_end_display" class="form-label">End date</label>
                        <div class="input-group">
                            <input
                                id="range_end_display"
                                class="form-control bootstrap-pickadate"
                                data-bs-pickadate-hidden-target="#range_end"
                                data-bs-pickadate-range-role="end"
                                data-bs-pickadate-range-pair="#range_start_display"
                                data-bs-pickadate-locale="current"
                            >
                            <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-toggle="#range_end_display">
                                <i class="bi bi-calendar-date"></i>
                            </button>
                        </div>
                        <input id="range_end" type="hidden" name="range_end">
                    </div>
                </div>
                <div class="form-text mt-2">
                    Start: <code id="range_start_output"></code> &mdash;
                    End: <code id="range_end_output"></code>
                </div>
            </div>
        </section>

        <section class="card mb-4">
            <div class="card-header">Same-input interval</div>
            <div class="card-body">
                <label for="booking_dates_display" class="form-label">Booking dates</label>
                <div class="input-group">
                    <input
                        id="booking_dates_display"
                        class="form-control bootstrap-pickadate"
                        data-bs-pickadate-mode="interval"
                        data-bs-pickadate-hidden-target="#booking_dates"
                        data-bs-pickadate-hidden-start-target="#booking_start"
                        data-bs-pickadate-hidden-end-target="#booking_end"
                        data-bs-pickadate-locale="current"
                    >
                    <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-toggle="#booking_dates_display">
                        <i class="bi bi-calendar-range"></i>
                    </button>
                    <button class="btn btn-outline-secondary" type="button" data-bs-pickadate-clear="#booking_dates_display">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <input id="booking_dates" type="hidden" name="booking_dates">
                <input id="booking_start" type="hidden" name="booking_start">
                <input id="booking_end" type="hidden" name="booking_end">
                <div class="form-text mt-2">
                    Interval: <code id="booking_dates_output"></code><br>
                    Start: <code id="booking_start_output"></code> &mdash;
                    End: <code id="booking_end_output"></code>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="bootstrap-pickadate.js"></script>
    <script src="locales/bootstrap-pickadate.it.js"></script>
    <script>
        "use strict";

        bsPickadate.setDefaultLocale("it");

        function mirrorValue(inputId, outputId) {
            const input = document.getElementById(inputId);
            const output = document.getElementById(outputId);

            if (!input || !output) {
                return;
            }

            const update = function() {
                output.textContent = input.value || "";
            };

            input.addEventListener("input", update);
            input.addEventListener("change", update);
            update();
        }

        mirrorValue("example_date", "example_date_output");
        mirrorValue("range_start", "range_start_output");
        mirrorValue("range_end", "range_end_output");
        mirrorValue("booking_dates", "booking_dates_output");
        mirrorValue("booking_start", "booking_start_output");
        mirrorValue("booking_end", "booking_end_output");
    </script>
</body>
</html>
